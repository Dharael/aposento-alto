<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aposento Alto · Comunidad Cristiana</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#382417">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aposento Alto">
<style>
  :root{
    --cafe:#382417; --caramelo:#6D3C1C; --miel:#C57938; --vainilla:#E7C196;
    --crema:#F7EEE1; --crema2:#FBF5EC; --blanco:#FFFDF9; --oro:#E0A24B;
    --texto:#3A2A1C; --suave:#8A7358; --linea:#EAD9C2; --ok:#5B8C5A;
    --sombra:0 8px 30px rgba(56,36,23,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--texto);background:var(--cafe);display:flex;justify-content:center;overscroll-behavior:none}
  #app{width:100%;max-width:440px;min-height:100vh;background:radial-gradient(120% 60% at 50% -10%, #FDF4E6 0%, var(--crema) 45%, var(--crema2) 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.35)}
  #app::before{content:"";position:fixed;inset:0;max-width:440px;margin:0 auto;pointer-events:none;z-index:0;background:radial-gradient(60% 40% at 50% 0%, rgba(224,162,75,.14), transparent 70%),repeating-conic-gradient(from 0deg at 50% -5%, rgba(224,162,75,.05) 0deg 6deg, transparent 6deg 14deg);opacity:.6}
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 96px;position:relative;z-index:1;-webkit-overflow-scrolling:touch}
  .screen::-webkit-scrollbar{width:0}
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg, rgba(247,238,225,.96), rgba(247,238,225,.82));backdrop-filter:blur(10px);padding:14px 18px 12px;border-bottom:1px solid var(--linea);display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;flex:1}
  .logo{width:38px;height:38px;border-radius:12px;flex:none;background:linear-gradient(145deg,var(--miel),var(--caramelo));display:grid;place-items:center;box-shadow:0 4px 14px rgba(109,60,28,.35)}
  .logo svg{width:22px;height:22px}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:.3px;color:var(--cafe);font-family:Georgia,'Times New Roman',serif}
  .brand small{display:block;font-size:9.5px;color:var(--suave);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:-2px}
  .icon-btn{width:40px;height:40px;border:none;border-radius:12px;background:var(--blanco);box-shadow:var(--sombra);display:grid;place-items:center;cursor:pointer;color:var(--caramelo);position:relative}
  .icon-btn svg{width:20px;height:20px}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--miel);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center;padding:0 4px;border:2px solid var(--crema)}
  .title{font-size:23px;font-weight:800;color:var(--cafe);font-family:Georgia,serif;padding:20px 18px 4px}
  .subtitle{color:var(--suave);font-size:13.5px;padding:0 18px 14px;line-height:1.5}
  .card{background:var(--blanco);margin:12px 16px;border-radius:20px;box-shadow:var(--sombra);border:1px solid rgba(234,217,194,.7);overflow:hidden}
  .verse-hero{margin:16px;border-radius:24px;padding:24px 22px;color:#FBEFDD;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--caramelo) 0%,var(--cafe) 100%);box-shadow:0 14px 34px rgba(56,36,23,.32)}
  .verse-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(224,162,75,.45),transparent 70%)}
  .verse-hero .tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--vainilla);font-weight:700;position:relative}
  .verse-hero p{font-size:18.5px;line-height:1.55;margin:12px 0 14px;font-family:Georgia,serif;position:relative}
  .verse-hero .ref{font-weight:700;color:var(--oro);font-size:14px;position:relative}
  .verse-actions{display:flex;gap:8px;margin-top:16px;position:relative}
  .vbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#FBEFDD;border-radius:12px;padding:9px 12px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .vbtn:active{transform:scale(.96)}
  .vbtn svg{width:15px;height:15px}
  .vbtn.on{background:var(--oro);color:var(--cafe);border-color:var(--oro)}
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:6px 16px 4px}
  .quick button{background:var(--blanco);border:1px solid var(--linea);border-radius:16px;padding:14px 4px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(56,36,23,.06)}
  .quick button:active{transform:translateY(2px)}
  .qi{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(145deg,var(--vainilla),#F2D9B0);font-size:22px}
  .quick span{font-size:11px;font-weight:700;color:var(--cafe)}
  .sec-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 6px}
  .sec-head h2{font-size:17px;color:var(--cafe);font-weight:800;font-family:Georgia,serif}
  .sec-head a{color:var(--miel);font-size:12.5px;font-weight:700;cursor:pointer}
  .post-top{display:flex;align-items:center;gap:11px;padding:14px 16px 10px}
  .avatar{width:44px;height:44px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;background:linear-gradient(145deg,var(--miel),var(--caramelo));box-shadow:0 3px 10px rgba(109,60,28,.3)}
  .post-top .who{flex:1;min-width:0}
  .post-top .who b{font-size:14.5px;color:var(--cafe);display:flex;align-items:center;gap:5px}
  .post-top .who small{font-size:11.5px;color:var(--suave)}
  .verified{width:15px;height:15px;color:var(--miel)}
  .follow-btn{border:1.5px solid var(--miel);color:var(--miel);background:transparent;font-weight:700;font-size:12px;padding:6px 13px;border-radius:20px;cursor:pointer}
  .follow-btn.on{background:var(--miel);color:#fff}
  .mine-tag{border:1.5px solid var(--linea);color:var(--suave);background:var(--crema2);font-weight:700;font-size:11px;padding:6px 11px;border-radius:20px}
  .post-body{padding:2px 16px 12px;font-size:14.5px;line-height:1.6;color:var(--texto);white-space:pre-wrap;word-break:break-word}
  .post-verse{margin:4px 16px 12px;padding:14px 16px;background:linear-gradient(135deg,#FBF1E1,#F6E7CF);border-radius:14px;border-left:4px solid var(--miel);font-family:Georgia,serif;font-size:14.5px;line-height:1.55;color:var(--caramelo)}
  .post-verse b{display:block;margin-top:8px;font-size:12.5px;color:var(--miel);font-family:'Segoe UI',sans-serif}
  .event{margin:0 16px 12px;border:1px solid var(--linea);border-radius:16px;overflow:hidden}
  .event-band{background:linear-gradient(135deg,var(--caramelo),var(--cafe));color:#FBEFDD;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .event-date{background:rgba(255,255,255,.15);border-radius:12px;padding:6px 10px;text-align:center;line-height:1.1;flex:none;min-width:48px}
  .event-date b{display:block;font-size:19px}
  .event-date span{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--vainilla)}
  .event-band .ev-info b{font-size:14.5px}
  .event-band .ev-info small{color:var(--vainilla);font-size:12px}
  .event-foot{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--crema2)}
  .going{font-size:12px;color:var(--suave);display:flex;align-items:center;gap:6px}
  .going .dots{display:flex}
  .going .dots i{width:22px;height:22px;border-radius:50%;background:var(--vainilla);border:2px solid var(--blanco);margin-left:-8px;display:grid;place-items:center;font-size:10px;font-style:normal;color:var(--caramelo);font-weight:700}
  .assist{background:var(--miel);color:#fff;border:none;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .assist.on{background:var(--ok)}
  .assist svg{width:15px;height:15px}
  .reacts{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--linea);flex-wrap:wrap}
  .react{border:1px solid var(--linea);background:var(--crema2);border-radius:20px;padding:7px 12px;font-size:12.5px;font-weight:700;color:var(--caramelo);cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
  .react .em{font-size:15px}
  .react.on{background:linear-gradient(135deg,var(--vainilla),#F2D9B0);border-color:var(--miel);color:var(--cafe);transform:scale(1.04)}
  .react:active{transform:scale(.94)}
  .react .n{font-size:11px;color:var(--suave)}
  .emos{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:8px 16px}
  .emo{border:none;border-radius:18px;padding:18px 16px;text-align:left;cursor:pointer;color:#fff;position:relative;overflow:hidden;box-shadow:var(--sombra);min-height:96px;display:flex;flex-direction:column;justify-content:space-between}
  .emo .em{font-size:26px}
  .emo b{font-size:15px;font-weight:800}
  .emo small{font-size:11px;opacity:.85;display:block;margin-top:2px}
  .emo:active{transform:scale(.97)}
  .story{display:flex;gap:14px;align-items:center;padding:14px 16px;cursor:pointer}
  .story:not(:last-child){border-bottom:1px solid var(--linea)}
  .story-ic{width:52px;height:52px;border-radius:16px;flex:none;display:grid;place-items:center;font-size:24px;background:linear-gradient(145deg,var(--vainilla),#F2D9B0)}
  .story .st{flex:1}
  .story .st b{font-size:15px;color:var(--cafe);display:block}
  .story .st small{font-size:12px;color:var(--suave)}
  .chev{color:var(--miel);width:20px;height:20px;flex:none}
  .pray-card{margin:12px 16px;background:linear-gradient(155deg,#FBF3E6,#F5E6CE);border-radius:20px;padding:20px;border:1px solid var(--linea);box-shadow:var(--sombra)}
  .pray-card .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--miel);font-weight:800;display:flex;align-items:center;gap:6px}
  .pray-text{font-family:Georgia,serif;font-size:16px;line-height:1.7;color:var(--caramelo);margin:14px 0 6px;min-height:120px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{height:0}
  .pchip{white-space:nowrap;border:1px solid var(--linea);background:var(--blanco);color:var(--caramelo);font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:20px;cursor:pointer}
  .pchip.on{background:var(--miel);color:#fff;border-color:var(--miel)}
  .gen-btn{width:calc(100% - 32px);margin:6px 16px 4px;background:linear-gradient(135deg,var(--miel),var(--caramelo));color:#fff;border:none;padding:15px;border-radius:16px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 8px 20px rgba(109,60,28,.3);display:flex;align-items:center;justify-content:center;gap:8px}
  .gen-btn:active{transform:scale(.98)}
  .room{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer}
  .room:not(:last-child){border-bottom:1px solid var(--linea)}
  .live{width:10px;height:10px;border-radius:50%;background:#D64545;flex:none;animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(214,69,69,.5)}70%{box-shadow:0 0 0 10px rgba(214,69,69,0)}100%{box-shadow:0 0 0 0 rgba(214,69,69,0)}}
  .room .ri{flex:1}
  .room .ri b{font-size:14.5px;color:var(--cafe);display:block}
  .room .ri small{font-size:12px;color:var(--suave)}
  .room .listeners{font-size:12px;color:var(--miel);font-weight:700;display:flex;align-items:center;gap:4px}
  .join{background:var(--caramelo);color:#fff;border:none;font-weight:700;font-size:12.5px;padding:9px 15px;border-radius:20px;cursor:pointer;margin-left:8px}
  .prof-hero{margin:16px;border-radius:24px;padding:26px 20px;text-align:center;color:#FBEFDD;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--caramelo),var(--cafe));box-shadow:var(--sombra)}
  .prof-hero .pav{width:82px;height:82px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;font-size:32px;font-weight:800;color:#fff;background:linear-gradient(145deg,var(--miel),var(--oro));border:3px solid rgba(255,255,255,.3)}
  .prof-hero h3{font-size:20px;font-family:Georgia,serif}
  .prof-hero .church{color:var(--vainilla);font-size:13px;margin-top:4px}
  .prof-stats{display:flex;justify-content:center;gap:26px;margin-top:16px}
  .prof-stats div{text-align:center}
  .prof-stats b{font-size:19px;display:block}
  .prof-stats small{font-size:11px;color:var(--vainilla)}
  .edit-mini{margin-top:14px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);color:#FBEFDD;font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:20px;cursor:pointer}
  .list-row{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer}
  .list-row:not(:last-child){border-bottom:1px solid var(--linea)}
  .list-row .lr-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--crema2);color:var(--caramelo)}
  .list-row .lr-ic svg{width:19px;height:19px}
  .list-row span{flex:1;font-size:14.5px;font-weight:600;color:var(--cafe)}
  .list-row .cnt{font-size:12.5px;color:var(--suave);font-weight:700;background:var(--crema2);padding:2px 9px;border-radius:10px}
  .nav{position:absolute;bottom:0;left:0;right:0;z-index:30;background:linear-gradient(180deg,rgba(251,245,236,.85),rgba(251,245,236,.98));backdrop-filter:blur(14px);border-top:1px solid var(--linea);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  .nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--suave);position:relative}
  .nav button svg{width:23px;height:23px}
  .nav button span{font-size:10px;font-weight:700}
  .nav button.on{color:var(--caramelo)}
  .nav button.on::before{content:"";position:absolute;top:-8px;width:26px;height:3px;border-radius:3px;background:var(--miel)}
  .fab{position:absolute;right:18px;bottom:86px;z-index:29;width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,var(--miel),var(--caramelo));border:none;color:#fff;box-shadow:0 10px 24px rgba(109,60,28,.45);cursor:pointer;display:grid;place-items:center}
  .fab svg{width:26px;height:26px}
  .fab:active{transform:scale(.92)}
  .sheet{position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:100;display:none}
  .sheet.open{display:block}
  .sheet-bg{position:absolute;inset:0;background:rgba(56,36,23,.55);backdrop-filter:blur(2px)}
  .sheet-body{position:absolute;left:0;right:0;bottom:0;max-height:94%;background:var(--crema);border-radius:26px 26px 0 0;overflow-y:auto;padding:8px 0 30px;animation:up .3s ease}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grabber{width:44px;height:5px;background:var(--linea);border-radius:3px;margin:8px auto 4px}
  .sheet-head{padding:10px 22px 6px;display:flex;align-items:center;justify-content:space-between}
  .sheet-head h2{font-size:21px;font-family:Georgia,serif;color:var(--cafe)}
  .sheet-head button{background:var(--blanco);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--caramelo);cursor:pointer;box-shadow:var(--sombra)}
  .reader{padding:6px 24px;font-size:16.5px;line-height:1.85;color:var(--texto);font-family:Georgia,serif}
  .reader p{margin-bottom:14px}
  .verse-list{padding:6px 20px}
  .verse-item{background:var(--blanco);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--sombra);border-left:4px solid var(--miel);position:relative}
  .verse-item p{font-family:Georgia,serif;font-size:15.5px;line-height:1.6;color:var(--texto)}
  .verse-item b{color:var(--miel);font-size:12.5px;display:block;margin-top:8px}
  .vi-save{position:absolute;top:12px;right:12px;background:var(--crema2);border:1px solid var(--linea);border-radius:10px;width:32px;height:32px;cursor:pointer;color:var(--miel);display:grid;place-items:center}
  .vi-save svg{width:16px;height:16px}
  .vi-save.on{background:var(--miel);color:#fff}
  /* Formularios */
  .field{padding:6px 22px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--caramelo);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--linea);background:var(--blanco);border-radius:14px;padding:13px 14px;font-size:14.5px;color:var(--texto);font-family:inherit;outline:none}
  .field textarea{min-height:90px;resize:vertical;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--miel)}
  .type-tabs{display:flex;gap:8px;padding:8px 22px 4px}
  .type-tabs button{flex:1;border:1px solid var(--linea);background:var(--blanco);color:var(--caramelo);font-weight:700;font-size:12.5px;padding:10px 4px;border-radius:14px;cursor:pointer}
  .type-tabs button.on{background:linear-gradient(135deg,var(--miel),var(--caramelo));color:#fff;border-color:transparent}
  .primary-btn{width:calc(100% - 44px);margin:14px 22px 4px;background:linear-gradient(135deg,var(--miel),var(--caramelo));color:#fff;border:none;padding:15px;border-radius:16px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 8px 20px rgba(109,60,28,.3)}
  .primary-btn:active{transform:scale(.98)}
  .primary-btn.ghost{background:var(--blanco);color:var(--caramelo);border:1px solid var(--linea);box-shadow:none}
  .empty{text-align:center;color:var(--suave);font-size:13.5px;padding:40px 30px;line-height:1.6}
  .empty .big{font-size:40px;display:block;margin-bottom:10px}
  .composer{margin:10px 16px 0;background:var(--blanco);border-radius:18px;box-shadow:var(--sombra);border:1px solid var(--linea);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .composer .avatar{width:40px;height:40px;font-size:15px}
  .composer .ph{flex:1;color:var(--suave);font-size:14px}
  .composer .plus{color:var(--miel)}
  .devo{margin:12px 16px;background:var(--blanco);border-radius:20px;box-shadow:var(--sombra);border:1px solid var(--linea);overflow:hidden}
  .devo .dtop{padding:16px 18px 8px}
  .devo .dtop .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--miel);font-weight:800}
  .devo .dtop h3{font-size:17px;color:var(--cafe);font-family:Georgia,serif;margin-top:4px}
  .devo p{padding:0 18px 16px;font-size:14.5px;line-height:1.65;color:var(--texto)}
  .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);max-width:380px;background:var(--cafe);color:#FBEFDD;padding:13px 20px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:.3s;pointer-events:none;text-align:center}
  .toast.show{opacity:1}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .del{color:#B24A3A;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;display:inline-block}
  /* ---- Modo oscuro ---- */
  body.dark{ --cafe:#F3E8D8; --caramelo:#E0A24B; --crema:#221710; --crema2:#2A1D14; --blanco:#31241A; --texto:#EFE2D1; --suave:#B6997C; --linea:#463322; }
  body.dark #app{ background:radial-gradient(120% 60% at 50% -10%, #2C1D11 0%, #221710 45%, #1B120B 100%); }
  body.dark #app::before{ opacity:.28; }
  body.dark .top{ background:linear-gradient(180deg,rgba(34,23,16,.96),rgba(34,23,16,.8)); }
  body.dark .nav{ background:linear-gradient(180deg,rgba(34,23,16,.85),rgba(42,29,20,.98)); }
  body.dark .verse-hero, body.dark .prof-hero, body.dark .event-band{ background:linear-gradient(150deg,#3A2417,#160D07); }
  body.dark .pray-card{ background:linear-gradient(155deg,#2F2116,#241A11); }
  body.dark .pray-text{ color:var(--vainilla); }

  esperanza:[{t:'Porque yo sé los pensamientos que tengo acerca de vosotros, pensamientos de paz, y no de mal, para daros el fin que esperáis.', r:'Jeremías 29:11'},{t:'Los que esperan a Jehová tendrán nuevas fuerzas; levantarán alas como las águilas.', r:'Isaías 40:31'},{t:'Y la esperanza no avergüenza; porque el amor de Dios ha sido derramado en nuestros corazones.', r:'Romanos 5:5'},{t:'Espera en Jehová; esfuérzate, y aliéntese tu corazón; sí, espera a Jehová.', r:'Salmo 27:14'},{t:'Bienaventurado el hombre cuya esperanza es Jehová su Dios.', r:'Salmo 146:5'},{t:'A los que aman a Dios, todas las cosas les ayudan a bien.', r:'Romanos 8:28'},{t:'Las cosas que ojo no vio, ni oído oyó... son las que Dios ha preparado para los que le aman.', r:'1 Corintios 2:9'},{t:'Retengamos firme, sin fluctuar, la profesión de nuestra esperanza, porque fiel es el que prometió.', r:'Hebreos 10:23'}],
  gratitud:[{t:'Dad gracias en todo, porque esta es la voluntad de Dios para con vosotros en Cristo Jesús.', r:'1 Tesalonicenses 5:18'},{t:'Alabad a Jehová, porque él es bueno; porque para siempre es su misericordia.', r:'Salmo 136:1'},{t:'Bendice, alma mía, a Jehová, y no olvides ninguno de sus beneficios.', r:'Salmo 103:2'},{t:'Entrad por sus puertas con acción de gracias, por sus atrios con alabanza.', r:'Salmo 100:4'},{t:'Toda buena dádiva y todo don perfecto desciende de lo alto, del Padre de las luces.', r:'Santiago 1:17'},{t:'Gracias a Dios por su don inefable.', r:'2 Corintios 9:15'},{t:'Cantad a Jehová, porque ha hecho cosas magníficas.', r:'Isaías 12:5'},{t:'Grande es Jehová, y digno de suprema alabanza.', r:'Salmo 145:3'}]

const stories = [
  {id:'creacion', em:'🌅', name:'La Creación', sub:'Génesis 1-2', cat:'at', text:['En el principio creó Dios los cielos y la tierra. Y la tierra estaba desordenada y vacía, y las tinieblas estaban sobre la faz del abismo, y el Espíritu de Dios se movía sobre la faz de las aguas.','Y dijo Dios: Sea la luz; y fue la luz. Y vio Dios que la luz era buena; y separó Dios la luz de las tinieblas. A la luz llamó Día, y a las tinieblas llamó Noche. Y fue la tarde y la mañana un día.','En el segundo día separó las aguas, formando el cielo. En el tercero juntó las aguas y apareció la tierra seca, y ordenó que brotara la hierba, las plantas y los árboles con su fruto, cada uno según su especie.','En el cuarto día hizo el sol para el día y la luna y las estrellas para la noche. En el quinto llenó los mares de peces y el cielo de aves, y los bendijo para que se multiplicaran.','En el sexto día hizo los animales de la tierra. Y dijo Dios: Hagamos al hombre a nuestra imagen, conforme a nuestra semejanza. Y creó Dios al hombre; varón y hembra los creó, y los bendijo, y les dio dominio sobre la creación.','Y vio Dios todo lo que había hecho, y he aquí que era bueno en gran manera. El séptimo día reposó de toda su obra, y lo santificó. Así, desde el principio, todo lo que existe salió de las manos de un Dios de amor y de orden.']},
  {id:'adaneva', em:'🌳', name:'Adán y Eva', sub:'Génesis 2-3', cat:'at', text:['Dios formó al hombre del polvo de la tierra y sopló en su nariz aliento de vida. Lo puso en el huerto del Edén, un lugar hermoso, para que lo cultivara y lo guardara.','Viendo que no era bueno que el hombre estuviera solo, Dios hizo caer un sueño profundo sobre Adán y de su costilla formó a la mujer, Eva. Y fueron una sola carne, sin vergüenza, en perfecta comunión con Dios.','Dios les permitió comer de todo árbol del huerto, excepto del árbol de la ciencia del bien y del mal, pues el día que comieran de él, morirían.','Pero la serpiente, astuta, engañó a Eva: "No moriréis; seréis como Dios." Ella tomó del fruto, comió, y dio también a su marido. Entonces sus ojos fueron abiertos y conocieron la vergüenza.','Cuando Dios los buscó, ellos se escondieron. Por su desobediencia fueron sacados del huerto, y entró el dolor y la muerte al mundo. Pero Dios, en su amor, ya prometía un Salvador que un día vencería a la serpiente.','Es la historia de cómo el pecado entró al mundo, pero también del primer destello de la gracia: Dios no abandonó al hombre, sino que comenzó desde ese día su plan de redención.']},
  {id:'noe', em:'🌈', name:'El Arca de Noé', sub:'Génesis 6-9', cat:'at', text:['La maldad de los hombres había crecido tanto sobre la tierra que todo pensamiento de su corazón era de continuo solo el mal. Y le dolió a Dios haber hecho al hombre. Pero Noé halló gracia ante los ojos de Jehová, porque era un varón justo que caminaba con Dios.','Dios le dijo a Noé que enviaría un diluvio, y le mandó construir un arca de madera de gofer, con medidas exactas, cubierta de brea por dentro y por fuera. Noé obedeció en todo, aunque el pueblo se burlaba de él mientras la construía.','Cuando el arca estuvo lista, Dios hizo entrar a Noé, a su esposa, a sus tres hijos y sus esposas, junto con parejas de todos los animales, para conservar la vida sobre la tierra.','Se abrieron las fuentes del abismo y las ventanas de los cielos. Llovió cuarenta días y cuarenta noches, y las aguas subieron y cubrieron aun los montes más altos. Solo quedó con vida lo que estaba en el arca.','Pasado el diluvio, Dios envió un viento, y las aguas descendieron. Noé soltó una paloma que volvió con una hoja de olivo: la tierra estaba seca. Salieron del arca y Noé levantó altar y adoró a Dios.','Entonces Dios puso el arco iris en las nubes como señal de su pacto eterno: nunca más destruiría toda carne con un diluvio. Fue promesa de misericordia, y recordatorio de que Dios guarda a los suyos en medio de la tormenta.']},
  {id:'abraham', em:'✨', name:'La fe de Abraham', sub:'Génesis 12-22', cat:'at', text:['Jehová dijo a Abram: Vete de tu tierra y de tu parentela, a la tierra que te mostraré. Y haré de ti una nación grande, y serán benditas en ti todas las familias de la tierra.','Abraham creyó y salió sin saber a dónde iba, confiando solo en la palabra de Dios. Aunque él y su esposa Sara eran ancianos y sin hijos, Dios le prometió una descendencia tan numerosa como las estrellas del cielo.','Los años pasaron y la promesa parecía imposible. Pero cuando Abraham tenía cien años y Sara noventa, nació Isaac, el hijo de la promesa, y su casa se llenó de risa y alegría.','Un día, Dios probó a Abraham y le pidió que ofreciera a Isaac en sacrificio. Con el corazón quebrantado pero obediente, Abraham subió al monte. Confiaba en que Dios proveería.','Cuando levantó el cuchillo, el ángel de Jehová lo detuvo: "No hagas nada al muchacho, porque ya conozco que temes a Dios." Y apareció un carnero trabado en un zarzal, que Abraham ofreció en lugar de su hijo.','Por su fe, Abraham fue llamado amigo de Dios y padre de todos los creyentes. Su historia nos enseña a confiar aun cuando no entendemos, porque Jehová-jireh, el Señor, siempre provee.']},
  {id:'jose', em:'👑', name:'José y sus hermanos', sub:'Génesis 37-45', cat:'at', text:['José era el hijo amado de Jacob, quien le hizo una túnica de muchos colores. Sus hermanos lo envidiaban, y más aún cuando José contó sus sueños, en los que ellos se inclinaban ante él.','Llenos de celos, lo arrojaron a un pozo y luego lo vendieron a unos mercaderes que iban a Egipto. Le dijeron a su padre que una fiera lo había devorado, y Jacob lloró a su hijo por muchos días.','En Egipto, José sirvió con fidelidad en casa de Potifar, pero fue calumniado y echado a la cárcel injustamente. Sin embargo, Jehová estaba con él, y aun allí prosperaba todo lo que hacía.','José interpretó los sueños del faraón: vendrían siete años de abundancia y siete de hambre. El faraón, admirado por su sabiduría, lo puso como gobernador de todo Egipto para guardar el alimento.','Cuando llegó el hambre, los hermanos de José vinieron a Egipto a comprar comida, sin reconocerlo. José, conmovido, se dio a conocer entre lágrimas y los perdonó.','"Vosotros pensasteis mal contra mí, mas Dios lo encaminó a bien", les dijo. Trajo a su padre y a toda su familia a Egipto. Es una hermosa historia de perdón, y de cómo Dios convierte el dolor en propósito.']},
  {id:'moises', em:'🔥', name:'Moisés y el éxodo', sub:'Éxodo 3-14', cat:'at', text:['El pueblo de Israel gemía bajo la dura esclavitud de Egipto. Dios escuchó su clamor y llamó a Moisés desde una zarza que ardía sin consumirse: "He visto la aflicción de mi pueblo; ven, te enviaré a Faraón para que saques a mi pueblo."','Moisés se sintió incapaz, pero Dios prometió estar con él. Junto a su hermano Aarón, se presentó ante el faraón y le dijo: "Jehová dice: Deja ir a mi pueblo." Pero el faraón endureció su corazón y se negó.','Entonces Dios envió diez plagas sobre Egipto: el agua en sangre, las ranas, los piojos, las moscas, la peste, las úlceras, el granizo, las langostas, las tinieblas, y por último la muerte de los primogénitos.','Aquella noche, cada familia israelita marcó su puerta con la sangre de un cordero, y la muerte pasó de largo: fue la primera Pascua. Finalmente el faraón los dejó salir, y el pueblo partió con gran multitud.','Pero el faraón se arrepintió y los persiguió hasta el Mar Rojo. El pueblo temió, pero Moisés dijo: "No temáis; ved la salvación de Jehová." Extendió su mano y Dios abrió las aguas; Israel cruzó en seco.','Cuando los egipcios entraron tras ellos, las aguas volvieron y los cubrieron. Israel fue libre. Dios los guió con nube de día y columna de fuego de noche. Es la gran historia de la liberación por el poder de Dios.']},
  {id:'diez', em:'📜', name:'Los Diez Mandamientos', sub:'Éxodo 19-20', cat:'at', text:['Tres meses después de salir de Egipto, el pueblo llegó al desierto de Sinaí y acampó frente al monte. Dios llamó a Moisés a subir, y descendió sobre el monte en fuego, humo y truenos.','Allí, en medio de la gloria de Dios, Moisés recibió las tablas de la ley: diez palabras que enseñan a amar a Dios y al prójimo, escritas por el dedo mismo de Dios.','Los primeros mandamientos hablan del amor a Dios: no tener otros dioses, no hacer imágenes para adorarlas, no tomar su nombre en vano, y guardar el día de reposo.','Los demás enseñan a amar al prójimo: honrar a los padres, no matar, no cometer adulterio, no robar, no mentir y no codiciar lo ajeno.','El pueblo prometió obedecer, pero pronto olvidó su promesa. Aun así, la ley reveló la santidad de Dios y la necesidad que todos tenemos de su gracia.','Jesús resumiría toda la ley en dos mandamientos: amar a Dios sobre todas las cosas y amar al prójimo como a uno mismo. En el amor se cumple toda la ley.']},
  {id:'josue', em:'🎺', name:'Josué y Jericó', sub:'Josué 6', cat:'at', text:['Tras la muerte de Moisés, Josué guió a Israel a la tierra prometida. La primera ciudad, Jericó, estaba fuertemente amurallada y cerrada a cal y canto por causa de los hijos de Israel.','Dios dio a Josué una orden extraña: durante seis días, el pueblo marcharía una vez al día alrededor de la ciudad, con siete sacerdotes tocando trompetas delante del arca del pacto.','El pueblo obedeció en silencio, día tras día, confiando aunque no entendían. La fe muchas veces es marchar aun cuando el muro sigue en pie.','Al séptimo día, dieron siete vueltas. Entonces los sacerdotes tocaron las trompetas y Josué dijo: "¡Gritad, porque Jehová os ha entregado la ciudad!"','El pueblo gritó a gran voz, y los muros de Jericó cayeron por completo. La ciudad fue tomada, no por la fuerza de los hombres, sino por la obediencia y el poder de Dios.','Rahab, la mujer que había escondido a los espías, fue salvada con su familia. Es la historia de cómo la fe derriba murallas imposibles cuando confiamos en Dios.']},
  {id:'sanson', em:'💪', name:'Sansón', sub:'Jueces 13-16', cat:'at', text:['Sansón nació por promesa de Dios para librar a Israel de los filisteos. Desde el vientre fue nazareo: su cabello nunca sería cortado, como señal de su consagración, y en él residía una fuerza sobrenatural.','Con esa fuerza, Sansón hizo grandes proezas: mató a un león con sus manos y derrotó a ejércitos enteros. Pero también fue débil de carácter y cayó en malas decisiones.','Se enamoró de Dalila, quien fue sobornada por los filisteos para descubrir el secreto de su fuerza. Ella insistió hasta que Sansón le reveló que estaba en su cabello.','Mientras dormía, cortaron su cabello. Al despertar, su fuerza lo había dejado. Los filisteos lo capturaron, le sacaron los ojos y lo pusieron a moler en la cárcel, humillado.','Pero su cabello comenzó a crecer de nuevo. Un día lo llevaron a un templo lleno de gente para burlarse de él. Sansón oró: "Señor, acuérdate de mí, y fortaléceme solo esta vez."','Con fuerzas renovadas, empujó las columnas del templo, que se derrumbó sobre miles de filisteos. Fue su mayor victoria. Su historia nos enseña que Dios da nuevas oportunidades a quien vuelve a Él.']},
  {id:'rut', em:'🌾', name:'Rut y Noemí', sub:'Libro de Rut', cat:'at', text:['Noemí quedó viuda en tierra extranjera, y también murieron sus dos hijos. Decidió regresar a Belén, su tierra, y les dijo a sus nueras que volvieran con sus familias.','Una de ellas, Rut, se negó a dejarla, y pronunció palabras hermosas: "A dondequiera que tú fueres, iré yo; tu pueblo será mi pueblo, y tu Dios mi Dios." Y se fue con ella.','En Belén, siendo pobres, Rut salió a recoger espigas que quedaban en los campos para alimentar a Noemí. Por providencia, llegó al campo de Booz, un hombre justo y pariente de la familia.','Booz, al saber de su fidelidad hacia Noemí, la trató con bondad y la protegió, mandando que dejaran espigas de más para ella. Rut halló gracia a sus ojos.','Según la ley, Booz podía redimir la herencia de la familia y tomar a Rut por esposa. Con honor, lo hizo, y se casaron. Dios cambió el luto en gozo.','Rut tuvo un hijo, Obed, quien fue abuelo del rey David, del linaje del cual vendría Jesús. Es una historia de lealtad, humildad y de cómo Dios cuida a los que confían en Él.']},
  {id:'samuel', em:'🕯️', name:'El niño Samuel', sub:'1 Samuel 1-3', cat:'at', text:['Ana era una mujer que no podía tener hijos, y lloraba delante de Jehová. En el templo oró con tanta angustia que sus labios se movían sin voz, pidiendo un hijo.','Dios escuchó su oración y le dio un niño, a quien llamó Samuel. Agradecida, Ana lo dedicó al Señor, y cuando creció lo llevó al templo para que sirviera a Dios junto al sacerdote Elí.','Una noche, mientras Samuel dormía, oyó una voz que lo llamaba. Corrió a Elí, pero no era él. Sucedió tres veces, hasta que Elí comprendió que era Dios quien llamaba al niño.','Elí le enseñó a responder: "Habla, Jehová, porque tu siervo oye." Samuel obedeció, y Dios comenzó a hablarle y a revelarle su palabra.','Samuel creció, y Jehová estaba con él; no dejó caer a tierra ninguna de sus palabras. Todo Israel supo que Samuel era profeta fiel del Señor.','Es la historia de un corazón dispuesto a escuchar a Dios desde pequeño, y de una madre que confió su mayor tesoro en las manos del Señor.']},
  {id:'david', em:'⚔️', name:'David y Goliat', sub:'1 Samuel 17', cat:'at', text:['Los filisteos y los israelitas estaban en guerra. De entre los filisteos salía un gigante llamado Goliat, de casi tres metros de altura, que desafiaba cada día al ejército de Israel, y todos temblaban de miedo.','David, un joven pastor, llegó al campamento a llevar comida a sus hermanos. Al oír las burlas del gigante contra el Dios vivo, se llenó de santo valor y se ofreció a pelear.','El rey Saúl dudó por su juventud, pero David respondió: "Jehová, que me ha librado de las garras del león y del oso, él me librará de la mano de este filisteo."','Rechazó la pesada armadura del rey. Tomó solo su cayado, su honda y cinco piedras lisas del arroyo, y se acercó al gigante en el nombre de Jehová de los ejércitos.','Goliat se burló, pero David corrió hacia él, tomó una piedra y la lanzó con la honda. La piedra se clavó en la frente del gigante, que cayó a tierra. Así venció David sin espada.','Israel obtuvo la victoria. La historia nos enseña que no importa el tamaño del gigante que enfrentemos: cuando la batalla es de Dios, Él pelea por nosotros.']},
  {id:'salomon', em:'💎', name:'La sabiduría de Salomón', sub:'1 Reyes 3', cat:'at', text:['Salomón, hijo de David, llegó a ser rey de Israel. Una noche Dios se le apareció en sueños y le dijo: "Pide lo que quieras que yo te dé."','Salomón pudo pedir riquezas, larga vida o la muerte de sus enemigos. Pero pidió: "Dame un corazón entendido para juzgar a tu pueblo, y para discernir entre lo bueno y lo malo."','A Dios le agradó tanto su petición que le dio sabiduría como nadie tuvo antes ni después, y además le añadió riquezas y honra que no había pedido.','Poco después, dos mujeres vinieron ante él disputando por un niño, ambas diciendo ser la madre. Salomón ordenó partir al niño en dos, para dárselo a ambas.','La verdadera madre, con el corazón lleno de amor, rogó que no lo mataran y que se lo dieran a la otra. Así Salomón supo quién era la madre y le entregó a su hijo.','Todo Israel admiró la sabiduría de Dios que había en él. La historia nos enseña a pedir a Dios sabiduría antes que cualquier otra cosa, pues vale más que el oro.']},
  {id:'elias', em:'🔥', name:'Elías en el monte Carmelo', sub:'1 Reyes 18', cat:'at', text:['En días de gran apostasía, el profeta Elías se levantó solo contra cuatrocientos cincuenta profetas de Baal. Retó al pueblo: "¿Hasta cuándo claudicaréis entre dos pensamientos? Si Jehová es Dios, seguidle."','Propuso una prueba en el monte Carmelo: cada lado prepararía un sacrificio sin fuego, y el Dios que respondiera con fuego del cielo, ese sería el verdadero Dios.','Los profetas de Baal clamaron desde la mañana hasta la tarde, gritaron y se hirieron, pero no hubo respuesta ni voz alguna. Su dios no existía.','Entonces Elías reparó el altar de Jehová, puso el sacrificio y mandó derramar mucha agua sobre él, hasta empapar todo. Luego oró con sencillez: "Jehová, sea hoy manifiesto que tú eres Dios en Israel."','Al instante cayó fuego de Jehová y consumió el holocausto, la leña, las piedras y hasta el agua. El pueblo cayó sobre su rostro clamando: "¡Jehová es el Dios! ¡Jehová es el Dios!"','Es la historia de un hombre que confió en Dios frente a la multitud, y del Dios que responde con poder a la oración de fe.']},
  {id:'job', em:'🌾', name:'La fe de Job', sub:'Libro de Job', cat:'at', text:['Job era un hombre perfecto y recto, temeroso de Dios, muy rico y padre de diez hijos. En un solo día lo perdió casi todo: sus bienes, sus siervos y todos sus hijos.','Aun en medio de tanto dolor, Job cayó a tierra, adoró y dijo: "Desnudo salí del vientre de mi madre, y desnudo volveré. Jehová dio, y Jehová quitó; sea el nombre de Jehová bendito."','Después perdió también su salud, cubierto de llagas de pies a cabeza. Su esposa le dijo que maldijera a Dios, pero él respondió: "¿Recibiremos de Dios el bien, y el mal no lo recibiremos?"','Sus amigos vinieron y lo acusaron, pensando que sufría por algún pecado. Job clamó a Dios entre lágrimas, sin entender el porqué, pero sin soltar su fe.','Al final, Dios mismo le habló desde un torbellino, mostrándole su grandeza. Job se humilló y confió más que nunca: "Yo te conocía de oídas, mas ahora mis ojos te ven."','Entonces Dios restauró a Job y le dio el doble de todo lo que tenía. Su historia nos enseña que, aun en la prueba más oscura, Dios es fiel y tiene la última palabra.']},
  {id:'ester', em:'👸', name:'La reina Ester', sub:'Libro de Ester', cat:'at', text:['Ester era una joven judía, huérfana, criada por su primo Mardoqueo. Por su belleza y gracia, llegó a ser reina de Persia, aunque nadie sabía que era judía.','El malvado Amán, alto oficial del rey, tramó un decreto para exterminar a todos los judíos del reino. Mardoqueo pidió a Ester que intercediera ante el rey por su pueblo.','Era peligroso presentarse ante el rey sin ser llamada; podía costarle la vida. Pero Mardoqueo le dijo: "¿Quién sabe si para esta hora has llegado al reino?"','Ester pidió que todos ayunaran por ella tres días, y decidió arriesgarlo todo: "Si perezco, que perezca." Con valentía y fe entró ante el rey, quien la recibió con favor.','En un banquete, Ester reveló el plan de Amán y suplicó por su pueblo. El rey se indignó, y el mismo Amán fue castigado, mientras los judíos fueron librados de la muerte.','Es la historia de una mujer valiente que Dios usó para salvar a su pueblo, colocada por su providencia en el lugar preciso y en el momento exacto.']},
  {id:'horno', em:'🔥', name:'Los tres jóvenes en el horno', sub:'Daniel 3', cat:'at', text:['El rey Nabucodonosor levantó una enorme estatua de oro y ordenó que todos se inclinaran ante ella al sonar la música, bajo pena de ser echados en un horno de fuego ardiendo.','Tres jóvenes hebreos —Sadrac, Mesac y Abed-nego— se negaron a adorar la estatua, pues solo servían al Dios verdadero. Fueron acusados y llevados ante el rey furioso.','Ellos respondieron con firmeza: "Nuestro Dios puede librarnos; y si no, sábete que no serviremos a tus dioses ni adoraremos tu estatua." Su fe no dependía del resultado.','El rey, enfurecido, mandó calentar el horno siete veces más, tan caliente que la llama mató a los soldados que los echaron dentro. Los tres cayeron atados en medio del fuego.','Pero el rey se asombró: "¿No echamos a tres? Yo veo cuatro hombres sueltos, y el aspecto del cuarto es semejante a un hijo de los dioses." Dios estaba con ellos en el fuego.','Salieron ilesos, sin olor a humo ni un cabello quemado. El rey bendijo al Dios de ellos. La historia nos enseña que Dios está con nosotros aun en medio de la prueba más ardiente.']},
  {id:'daniel', em:'🦁', name:'Daniel en el foso de los leones', sub:'Daniel 6', cat:'at', text:['Daniel servía en el reino con tal integridad que el rey pensaba ponerlo sobre todo el reino. Los demás gobernadores, llenos de envidia, buscaron cómo acusarlo, pero no hallaron falta en él.','Sabiendo que Daniel era fiel a Dios, tramaron una ley: que por treinta días nadie orara a otro dios ni hombre, sino solo al rey, bajo pena de ser echado a los leones. El rey firmó el decreto.','Cuando Daniel supo del decreto, entró en su casa y, con las ventanas abiertas hacia Jerusalén, se arrodilló tres veces al día como siempre, orando y dando gracias a su Dios.','Sus enemigos lo sorprendieron orando y lo acusaron. El rey, que amaba a Daniel, se afligió y buscó librarlo todo el día, pero la ley no podía cambiarse. A regañadientes, lo echaron al foso.','El rey pasó la noche en ayuno, sin dormir. Al amanecer corrió al foso y gritó: "Daniel, ¿te ha podido librar tu Dios?" Y Daniel respondió: "Mi Dios envió su ángel y cerró la boca de los leones."','Daniel salió sin lesión alguna, porque confió en su Dios. El rey proclamó por todo el reino que el Dios de Daniel es el Dios viviente. La fidelidad siempre tiene su recompensa.']},
  {id:'jonas', em:'🐋', name:'Jonás y el gran pez', sub:'Libro de Jonás', cat:'at', text:['Dios llamó a Jonás y le dijo: "Levántate y ve a Nínive, aquella gran ciudad, y predica contra ella." Pero Jonás no quería, y huyó en un barco rumbo a Tarsis, en dirección contraria.','En el mar se levantó una tempestad tan grande que el barco estaba a punto de romperse. Los marineros clamaban cada uno a su dios, mientras Jonás dormía. Al fin comprendieron que la tormenta era por causa de él.','Jonás confesó: "Tomadme y echadme al mar, y se os aquietará." Con temor lo lanzaron al agua, y al instante el mar se calmó. Pero Dios tenía preparado un gran pez que se tragó a Jonás.','Tres días y tres noches estuvo Jonás en el vientre del pez. Allí, en lo profundo, oró arrepentido: "Invoqué en mi angustia a Jehová, y él me oyó." Entonces el pez lo vomitó en tierra seca.','Dios habló a Jonás por segunda vez, y esta vez obedeció. Fue a Nínive y predicó: "De aquí a cuarenta días Nínive será destruida." Toda la ciudad, desde el rey hasta el más pequeño, se arrepintió y ayunó.','Al ver Dios su arrepentimiento, tuvo misericordia y no los destruyó. La historia nos enseña que no se puede huir de Dios, que Él da segundas oportunidades, y que su gracia alcanza a todos.']},
  {id:'nacimiento', em:'⭐', name:'El nacimiento de Jesús', sub:'Lucas 2', cat:'jesus', text:['El ángel Gabriel fue enviado a una joven llamada María, y le anunció: "Concebirás en tu vientre, y darás a luz un hijo, y llamarás su nombre Jesús. Este será grande, e Hijo del Altísimo será llamado."','Por aquellos días, el emperador ordenó un censo, y todos debían inscribirse en su ciudad. José subió con María, su esposa encinta, desde Nazaret hasta Belén, la ciudad de David.','Estando allí, se cumplieron los días, y María dio a luz a su hijo primogénito. Lo envolvió en pañales y lo acostó en un pesebre, porque no había lugar para ellos en el mesón.','Aquella noche, unos pastores cuidaban sus rebaños en el campo. De pronto un ángel se les apareció y la gloria de Dios los rodeó: "No temáis; os ha nacido hoy un Salvador, que es Cristo el Señor."','Y una multitud de ángeles alababa a Dios diciendo: "¡Gloria a Dios en las alturas, y en la tierra paz, buena voluntad para con los hombres!" Los pastores fueron corriendo y hallaron al niño.','Después, unos sabios del oriente, guiados por una estrella, llegaron a adorarle y le ofrecieron oro, incienso y mirra. Así se cumplió la promesa: Emanuel, Dios con nosotros. El amor de Dios se hizo hombre para salvarnos.']},
  {id:'tempestad', em:'🌊', name:'Jesús calma la tempestad', sub:'Marcos 4', cat:'jesus', text:['Al caer la tarde, Jesús dijo a sus discípulos: "Pasemos al otro lado del lago." Dejaron la multitud y partieron en la barca, y Jesús, cansado, se durmió sobre un cabezal en la popa.','De repente se levantó una gran tempestad de viento, y las olas azotaban la barca de tal manera que ya se llenaba de agua. Los discípulos, muchos de ellos pescadores expertos, temieron por su vida.','Asustados, despertaron a Jesús gritando: "Maestro, ¿no tienes cuidado que perecemos?" Él se levantó tranquilo, en medio del caos.','Reprendió al viento y dijo al mar: "Calla, enmudece." Y al instante cesó el viento, y se hizo una gran bonanza. Todo quedó en perfecta calma.','Luego les preguntó: "¿Por qué estáis así amedrentados? ¿Cómo no tenéis fe?" Y ellos, llenos de asombro, se decían: "¿Quién es este, que aun el viento y el mar le obedecen?"','La historia nos enseña que, aunque el Señor parezca dormido en medio de nuestra tormenta, Él está en la barca con nosotros, y una sola palabra suya basta para traer la calma.']},
  {id:'panes', em:'🍞', name:'La multiplicación de los panes', sub:'Juan 6', cat:'jesus', text:['Una gran multitud seguía a Jesús porque veían las señales que hacía sanando a los enfermos. Subió a un monte y se sentó con sus discípulos, y vio venir hacia él a miles de personas.','Al acercarse la hora de comer, Jesús preguntó a Felipe dónde comprarían pan para todos. Era imposible: ni el salario de muchos meses alcanzaría para dar un poco a cada uno.','Andrés le dijo: "Aquí está un muchacho que tiene cinco panes de cebada y dos pececillos; mas ¿qué es esto para tantos?" Parecía muy poco para tanta necesidad.','Jesús mandó que la gente se recostara sobre la hierba: había unos cinco mil hombres, sin contar mujeres y niños. Tomó los panes, y habiendo dado gracias, comenzó a repartir.','Repartió pan y pescado a todos cuanto querían, y todos comieron hasta saciarse. Después recogieron doce cestas llenas de lo que sobró. Nada faltó, y aún sobró en abundancia.','La historia nos enseña que cuando ponemos lo poco que tenemos en las manos de Jesús, Él lo multiplica. Lo que para nosotros es insuficiente, en sus manos alcanza y sobra.']},
  {id:'lazaro', em:'🌟', name:'La resurrección de Lázaro', sub:'Juan 11', cat:'jesus', text:['Lázaro, hermano de María y Marta y amigo de Jesús, cayó gravemente enfermo. Sus hermanas mandaron avisar: "Señor, el que amas está enfermo." Pero Jesús se quedó dos días más donde estaba.','Cuando llegó a Betania, Lázaro llevaba ya cuatro días en el sepulcro. Marta salió a su encuentro y le dijo: "Señor, si hubieses estado aquí, mi hermano no habría muerto."','Jesús le respondió: "Yo soy la resurrección y la vida; el que cree en mí, aunque esté muerto, vivirá." Y al ver llorar a María y a los que la acompañaban, Jesús se conmovió y lloró.','Fueron al sepulcro, una cueva con una piedra encima. Jesús dijo: "Quitad la piedra." Marta dudó por el mal olor, pero Jesús le recordó: "¿No te dije que si crees, verás la gloria de Dios?"','Entonces Jesús alzó los ojos al cielo, dio gracias al Padre y clamó a gran voz: "¡Lázaro, ven fuera!" Y el que había muerto salió, atado de pies y manos con vendas.','Muchos creyeron en Jesús aquel día. La historia nos muestra que para Dios no hay situación sin esperanza: Él es el Señor de la vida, y aun lo que parece muerto puede volver a vivir.']},
  {id:'crucifixion', em:'🕊️', name:'La cruz y la resurrección', sub:'Lucas 23-24', cat:'jesus', text:['Jesús, siendo inocente, fue entregado, juzgado injustamente y condenado a morir en una cruz. Llevó sobre sí el peso del pecado del mundo, no por culpa suya, sino por amor a nosotros.','En el Calvario lo crucificaron entre dos malhechores. Aun allí, oró por quienes lo herían: "Padre, perdónalos, porque no saben lo que hacen." Y a un ladrón arrepentido le prometió el paraíso.','Al mediodía, las tinieblas cubrieron la tierra. Jesús clamó a gran voz: "Padre, en tus manos encomiendo mi espíritu", e inclinando la cabeza, entregó su vida. El velo del templo se rasgó en dos.','Lo sepultaron en una tumba nueva y pusieron una gran piedra a la entrada, con guardias vigilando. Sus discípulos quedaron sumidos en tristeza, creyendo que todo había terminado.','Pero al tercer día, muy de mañana, unas mujeres fueron al sepulcro y hallaron la piedra removida. Un ángel les dijo: "¿Por qué buscáis entre los muertos al que vive? No está aquí, ha resucitado."','¡Jesús vive! Se apareció a sus discípulos, comió con ellos y les dio esperanza. Por su muerte fuimos perdonados, y por su resurrección tenemos vida eterna. Este es el corazón del evangelio.']},
  {id:'samaritano', em:'❤️', name:'El buen samaritano', sub:'Lucas 10', cat:'parabolas', text:['Un maestro de la ley preguntó a Jesús: "¿Quién es mi prójimo?" Y Jesús respondió con una historia que cambiaría para siempre la manera de ver al necesitado.','Un hombre bajaba de Jerusalén a Jericó y cayó en manos de ladrones, que lo despojaron, lo hirieron y lo dejaron medio muerto en el camino.','Pasó un sacerdote, lo vio, y siguió de largo por el otro lado. Luego pasó un levita, hombre religioso, y también lo evitó. Ninguno se detuvo a ayudar.','Pero un samaritano, despreciado por los judíos, al verlo tuvo compasión. Se acercó, curó sus heridas con aceite y vino, lo puso en su cabalgadura y lo llevó a un mesón para cuidarlo.','Al día siguiente pagó al mesonero y dijo: "Cuídamelo, y todo lo que gastes de más, yo te lo pagaré cuando vuelva." Su amor no tuvo límites ni buscó recompensa.','Jesús preguntó: "¿Cuál de los tres fue el prójimo del herido?" Y concluyó: "Ve, y haz tú lo mismo." La historia nos enseña que amar al prójimo es actuar con misericordia, sin importar quién sea.']},
  {id:'prodigo', em:'🏠', name:'El hijo pródigo', sub:'Lucas 15', cat:'parabolas', text:['Un hombre tenía dos hijos. El menor le pidió su parte de la herencia, y el padre se la dio. Poco después, el joven se fue lejos a un país extraño y malgastó todo viviendo perdidamente.','Cuando lo hubo gastado todo, vino una gran hambre, y comenzó a pasar necesidad. Terminó cuidando cerdos, y deseaba llenar su estómago con la comida de ellos, pero nadie le daba nada.','Entonces, volviendo en sí, dijo: "¡Cuántos jornaleros en casa de mi padre tienen pan, y yo aquí perezco de hambre! Me levantaré e iré a mi padre, y le diré: Padre, he pecado."','Se levantó y fue. Y cuando aún estaba lejos, su padre lo vio y fue movido a misericordia; corrió, se echó sobre su cuello y lo besó, sin dejarlo terminar sus disculpas.','El padre mandó traer el mejor vestido, un anillo y calzado, y celebró una gran fiesta: "Este mi hijo muerto era, y ha revivido; se había perdido, y es hallado." Y comenzaron a regocijarse.','La historia nos revela el corazón de Dios: por más lejos que vayamos, Él espera con los brazos abiertos, listo para perdonar y recibirnos con fiesta cuando volvemos a casa.']},
  {id:'oveja', em:'🐑', name:'La oveja perdida', sub:'Lucas 15', cat:'parabolas', text:['Los publicanos y pecadores se acercaban a Jesús para oírle, y los religiosos murmuraban: "Este recibe a los pecadores, y come con ellos." Entonces Jesús les contó una parábola.','"¿Qué hombre de vosotros, teniendo cien ovejas, si pierde una de ellas, no deja las noventa y nueve en el desierto y va tras la que se perdió, hasta encontrarla?"','El pastor no se conforma con las que tiene. Aquella sola oveja perdida le importa tanto que sale a buscarla por montes y valles, sin descansar, hasta hallarla.','"Y cuando la encuentra, la pone sobre sus hombros gozoso; y al llegar a casa, reúne a sus amigos y vecinos, diciéndoles: Gozaos conmigo, porque he encontrado mi oveja que se había perdido."','Así, dijo Jesús, "habrá más gozo en el cielo por un pecador que se arrepiente, que por noventa y nueve justos que no necesitan arrepentimiento."','La historia nos muestra cuánto vale cada alma para Dios. Nunca somos un número: si te has sentido perdido, sábete que el Buen Pastor sale a buscarte a ti.']},
  {id:'pentecostes', em:'🔥', name:'El día de Pentecostés', sub:'Hechos 2', cat:'iglesia', text:['Antes de subir al cielo, Jesús prometió a sus discípulos: "Recibiréis poder cuando haya venido sobre vosotros el Espíritu Santo, y me seréis testigos hasta lo último de la tierra."','Obedeciendo, unos ciento veinte discípulos se reunían a orar en el aposento alto, unánimes, esperando la promesa del Padre. No sabían cómo vendría, pero perseveraban juntos en oración.','Cuando llegó el día de Pentecostés, de repente vino del cielo un estruendo como de un viento recio que llenó toda la casa donde estaban reunidos.','Y aparecieron lenguas repartidas, como de fuego, asentándose sobre cada uno de ellos. Todos fueron llenos del Espíritu Santo y comenzaron a hablar en otras lenguas, según el Espíritu les daba que hablasen.','La ciudad se conmovió. Pedro se puso de pie y predicó con valentía sobre Jesús muerto y resucitado. Aquellos que antes tenían miedo, ahora anunciaban el evangelio con poder.','Aquel día se añadieron como tres mil personas a la iglesia. Nació así la iglesia con fuego. Y aquella misma promesa del Espíritu Santo sigue siendo para ti y para los tuyos hoy.']},
  {id:'pablo', em:'💡', name:'La conversión de Pablo', sub:'Hechos 9', cat:'iglesia', text:['Saulo era un feroz perseguidor de los cristianos. Respirando amenazas y muerte, iba camino a Damasco con cartas para apresar a todos los que siguieran a Jesús y llevarlos presos.','De repente, cerca de la ciudad, lo rodeó un resplandor de luz del cielo. Cayó a tierra, y oyó una voz que le decía: "Saulo, Saulo, ¿por qué me persigues?"','"¿Quién eres, Señor?", preguntó temblando. Y la voz respondió: "Yo soy Jesús, a quien tú persigues." Saulo quedó ciego, y lo llevaron de la mano hasta Damasco.','Durante tres días estuvo sin ver, sin comer ni beber, orando. Dios envió a un discípulo llamado Ananías, quien con temor pero en obediencia oró por él; y al instante Saulo recuperó la vista.','Aquel perseguidor se convirtió en el mayor predicador del evangelio. Cambió su nombre a Pablo, y recorrió el mundo anunciando a Cristo, fundando iglesias y escribiendo gran parte del Nuevo Testamento.','La historia nos enseña que nadie está demasiado lejos de la gracia de Dios. Si Él pudo transformar a Saulo, puede cambiar cualquier corazón, incluso el que hoy parece imposible.']}
];

const prayers = {
  'Paz':['Padre celestial, en medio del ruido de este día vengo a ti buscando tu paz. Aquieta mi corazón, calma mis pensamientos y recuérdame que tú tienes el control. Que tu paz, que sobrepasa todo entendimiento, guarde mi mente y mi corazón. Confío en ti. En el nombre de Jesús, amén.','Señor, cuando la ansiedad toca mi puerta, elijo abrirte a ti. Lléname de tu calma, la que el mundo no puede dar. Enséñame a descansar en tu voluntad y a soltar lo que no puedo controlar. Tú eres mi refugio. Amén.'],
  'Protección':['Señor, cúbreme bajo la sombra de tus alas. Rodéame a mí y a los que amo con tu protección. Que ningún mal nos alcance, y que tus ángeles acampen alrededor de nosotros. Tú eres mi refugio y mi fortaleza. Descanso seguro en ti. Amén.','Dios todopoderoso, sé mi escudo hoy. Guarda mi entrada y mi salida, mis pensamientos y mis pasos. Aparta todo peligro de mi camino y del de mi familia. En tus manos estamos seguros. Amén.'],
  'Sanidad':['Dios de misericordia, tú eres mi sanador. Toca cada parte de mi cuerpo y de mi alma que necesita ser restaurada. Devuélveme las fuerzas, la salud y la esperanza. Creo en tu poder y me pongo en tus manos. Gracias por tu amor sanador. En Cristo, amén.','Señor Jesús, tú que sanaste a los enfermos, extiende tu mano sobre mí. Renueva mis fuerzas, quita todo dolor y lléname de tu vida. Confío en que tu tiempo es perfecto y tu amor no falla. Amén.'],
  'Provisión':['Padre, tú conoces mis necesidades antes de que yo las pida. Confío en que abrirás puertas y proveerás lo necesario a su tiempo. Dame sabiduría para administrar lo que me das y un corazón agradecido. Tú eres Jehová mi proveedor. Amén.','Señor, gracias porque nunca me has faltado. Provee hoy el pan de cada día y calma mi preocupación. Ayúdame a trabajar con esfuerzo y a confiar en tu cuidado fiel. Tú suples toda necesidad. Amén.'],
  'Gratitud':['Gracias, Señor, por el aliento de vida, por tu amor fiel y por cada bendición grande y pequeña. Gracias por sostenerme aun cuando no lo noto. Que mi vida sea una ofrenda de gratitud hacia ti cada día. Bendito seas por siempre. Amén.','Padre bueno, hoy quiero solo darte gracias. Por tu misericordia nueva cada mañana, por los que amo, por tu presencia. Mi corazón se alegra en ti. Recibe mi alabanza sincera. Amén.'],
  'Fortaleza':['Señor, cuando me siento débil, tú eres mi fuerza. Levántame con tu mano poderosa y renueva mis fuerzas como las alas del águila. Ayúdame a seguir adelante confiando en que todo lo puedo en Cristo que me fortalece. Amén.','Dios mío, dame ánimo para este día. Cuando quiera rendirme, recuérdame que tú vas delante de mí. Sostén mis manos cansadas y llena mi corazón de esperanza. Contigo puedo seguir. Amén.'],
  'Por mi familia':['Padre bueno, pongo a mi familia en tus manos. Guárdalos, guíalos y llénalos de tu amor. Que tu presencia habite en nuestro hogar, que haya unidad, perdón y fe. Que juntos te sirvamos todos los días de nuestra vida. Amén.','Señor, bendice a cada miembro de mi familia hoy. Protege a los que están lejos, sana lo que está herido y une nuestros corazones en tu amor. Que nuestro hogar sea un lugar donde tú reinas. Amén.'],
  'Perdón':['Señor, reconozco mis faltas delante de ti. Perdóname y límpiame con tu gracia. Ayúdame también a perdonar a quienes me han herido, para caminar libre y en paz. Gracias porque tu misericordia es nueva cada mañana. En Jesús, amén.','Padre, libera mi corazón de todo rencor. Dame la gracia de perdonar como tú me has perdonado. Quita el peso de la culpa y lléname de tu paz. Quiero caminar limpio delante de ti. Amén.','Dios de gracia, crea en mí un corazón limpio y renueva un espíritu recto dentro de mí. Lava lo que me pesa y devuélveme el gozo de tu salvación. Gracias porque tu amor es más grande que mi error. Amén.'],
  'Al despertar':['Buenos días, Señor. Gracias por un nuevo día lleno de tus misericordias. Toma mis manos, mis palabras y mis pasos hoy. Que en todo lo que haga te glorifique a ti. Guía mi camino y lléname de tu paz. En el nombre de Jesús, amén.','Padre, este es el día que tú hiciste; me gozaré y alegraré en él. Dame fuerzas para lo que venga y un corazón sensible a tu voz. Que sea de bendición para alguien hoy. Amén.','Señor, antes de comenzar, te entrego este día. Ordena mis prioridades, calma mis prisas y recuérdame que voy de tu mano. Contigo, todo estará bien. Amén.'],
  'Antes de dormir':['Padre, al terminar este día te doy gracias por tu cuidado. Perdona lo que hice mal y guarda mi descanso. En paz me acostaré y dormiré, porque solo tú me haces vivir confiado. Buenas noches, Señor. Amén.','Señor, entrego en tus manos las preocupaciones de hoy y las de mañana. Cuida a los que amo mientras dormimos. Que tu paz llene esta casa y renueve mis fuerzas. Amén.','Dios mío, gracias por sostenerme hoy. Mientras descanso, vela por mí. Que despierte mañana con nuevas fuerzas para servirte. En tus brazos reposo tranquilo. Amén.'],
  'Por los hijos':['Padre celestial, cuida a mis hijos por donde vayan. Guárdalos del mal, guía sus decisiones y haz que te conozcan y te amen. Que crezcan en sabiduría y en gracia delante de ti y de los hombres. En tus manos los pongo. Amén.','Señor, sé tú el pastor de mis hijos. Rodéalos de buenas amistades, dales un corazón obediente y sensible a tu voz. Donde yo no llego, llega tú. Gracias porque tú los amas aún más que yo. Amén.','Dios, bendice a mis hijos hoy. Sana sus heridas, fortalece su fe y llena su vida de propósito. Que sean luz en su generación. Confío en que cumplirás tu propósito en ellos. Amén.'],
  'Sabiduría':['Señor, dame sabiduría para este momento. Enséñame a distinguir lo bueno de lo mejor y a caminar en tu voluntad. Que tu Palabra sea lámpara a mis pies. No me apoyaré en mi prudencia, sino en ti. Amén.','Padre, tú das sabiduría abundantemente a quien te la pide. Dame discernimiento para decidir con justicia y humildad. Guía mis pensamientos y mis palabras. Reconozco que te necesito. Amén.','Dios, en medio de mis dudas, aclara mi mente y ordena mis pasos. Ayúdame a esperar tu tiempo y a confiar cuando no entiendo. Tú harás recta mi vereda. Amén.'],
  'En prueba':['Señor, en medio de esta prueba, sostén mi fe. No entiendo el porqué, pero confío en tu amor. Dame paciencia para esperar y fuerzas para no rendirme. Sé que todo lo encaminarás a bien. En ti descanso. Amén.','Padre, esta carga es pesada, pero no la llevo solo. Tú vas conmigo por el valle. Renueva mi esperanza y muéstrame tu mano. Después de la noche viene la mañana. Confío en ti. Amén.','Dios fiel, tú prometiste no dejarme ni desampararme. Aférrame a esa promesa hoy. Convierte esta prueba en testimonio y mi llanto en canción. Contigo venceré. Amén.'],
  'Por la iglesia':['Señor, bendice a tu iglesia y a mi congregación. Une nuestros corazones en amor, unción y verdad. Levanta a los pastores y líderes, y que muchas almas te conozcan. Envía tu Espíritu como en el aposento alto. Amén.','Padre, derrama tu fuego sobre tu pueblo. Que haya avivamiento, sanidad y salvación. Protege a los hermanos, provee para las necesidades y haz de tu casa un lugar de tu presencia. Amén.','Dios, te pido por cada familia de la iglesia. Sana lo herido, restaura lo caído y multiplica lo bueno. Que seamos luz en nuestra ciudad y sal en la tierra. Para tu gloria, amén.']

function renderPost(p){

      <div class="ev-info"><b>${escHtml(p.event.title)}</b><br><small>${escHtml(p.event.sub)}</small></div></div>
      <div class="event-foot"><div class="going"><div class="dots"><i>+</i><i>♥</i></div>${n} confirmados</div>
      <button class="assist ${going?'on':''}" onclick="toggleGoing('${p.id}')">${going?ic(svg.check)+' Asistiré':'Asistir'}</button></div></div>`;
  }
  const total=(counts.victoria||0)+(counts.viva||0)+(counts.uncion||0)+(counts.amen||0);
  h+=`<div class="reacts">`+reactionsDef.map(r=>`<button class="react ${myReact===r.id?'on':''}" onclick="react('${p.id}','${r.id}')"><span class="em">${r.em}</span>${r.name}<span class="n">${counts[r.id]||0}</span></button>`).join('')+`</div>`;
  h+=`<div style="display:flex;gap:16px;align-items:center;padding:4px 16px 12px">`;

async function loadChat(userId,keepScroll){
  try{
    const d=await API('dm?with='+encodeURIComponent(userId));
    const box=document.getElementById('chat-box'); if(!box) return;
    const atBottom = box.scrollHeight-box.scrollTop-box.clientHeight < 60;
    box.innerHTML = d.messages.length ? d.messages.map(chatBubble).join('') : `<div class="empty" style="padding:26px"><span class="big">✉️</span>Aún no hay mensajes.<br><span style="font-size:12.5px">Escribe el primero.</span></div>`;
    if(!keepScroll || atBottom) box.scrollTop=box.scrollHeight;
  }catch(e){}
}
function chatBubble(m){
  return m.me
    ? `<div style="align-self:flex-end;max-width:78%;background:linear-gradient(135deg,var(--miel),var(--caramelo));color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:14px;line-height:1.4">${escHtml(m.text)}</div>`
    : `<div style="align-self:flex-start;max-width:78%;background:var(--blanco);border:1px solid var(--linea);color:var(--texto);padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:14px;line-height:1.4">${escHtml(m.text)}</div>`;
}
async function sendDM(userId){
  const inp=document.getElementById('chat-input'); const t=(inp.value||'').trim(); if(!t) return;
  inp.value='';
  try{ await API('dm','POST',{to:userId,text:t}); await loadChat(userId); }
  catch(e){ toast(e.message); inp.value=t; }
}
async function toggleFollow(userId,btn){

function toggleGoing(id){ store.going[id]=!store.going[id]; persist(); if(tab==='inicio')loadFeed(true); if(store.going[id]) toast('¡Confirmado! Te esperamos 🙏'); }
async function react(id,rid){
  try{ const r=await API('react','POST',{postId:id,reaction:rid});

function saveVerse(text,ref,btn){
  if(isVerseSaved(ref)){ store.savedVerses=store.savedVerses.filter(v=>v.r!==ref); toast('Quitado de guardados'); }

}

async function publish(){

    const b=(document.getElementById('c-body').value||'').trim();

    payload.body=b;
  } else if(compType==='versiculo'){
    const t=(document.getElementById('c-vtext').value||'').trim();
    const r=(document.getElementById('c-vref').value||'').trim();
    if(!t){ toast('Escribe el versículo'); return; }
    payload.verse={text:t, ref:r||'—'};
    const cm=(document.getElementById('c-body').value||'').trim(); if(cm) payload.body=cm;
  } else {
    const ti=(document.getElementById('c-etitle').value||'').trim();
    const dt=document.getElementById('c-edate').value;
    const sub=(document.getElementById('c-esub').value||'').trim();
    if(!ti){ toast('Ponle nombre al culto'); return; }
    let day='--',mon='';
    if(dt){ const d=new Date(dt+'T00:00'); day=d.getDate(); mon=months[d.getMonth()]; }
    payload.event={day:day, month:mon, title:ti, sub:sub||'Te esperamos'};
    const b=(document.getElementById('c-body').value||'').trim(); if(b) payload.body=b;
  }
  try{ await API('post','POST',payload); closeSheet(); go('inicio'); toast('¡Publicado! 🙏 Tu palabra ya está en la comunidad'); }
  catch(e){ toast(e.message); }
}

function roomControlsHtml(r){
  let h='';
  if(r.myRole==='host' && r.hands && r.hands.length){
    h+=`<div style="margin:4px 16px 10px;padding:12px 14px;background:var(--crema2);border-radius:16px;border:1px solid var(--linea)">
      <div style="font-size:12px;color:var(--miel);font-weight:800;margin-bottom:8px">✋ Piden la palabra</div>`+
      r.hands.map(hd=>`<div style="display:flex;align-items:center;gap:10px;padding:4px 0"><div class="avatar" style="width:32px;height:32px;font-size:13px">${escHtml((hd.name||'?').charAt(0).toUpperCase())}</div><span style="flex:1;font-size:13.5px;color:var(--cafe);font-weight:600">${escHtml(hd.name)}</span><button class="assist" onclick="grantWord('${r.id}','${hd.id}')">Dar la palabra</button></div>`).join('')+
      `</div>`;
  }
  // El anfitrión controla a quién tiene la palabra: puede quitársela
  if(r.myRole==='host'){
    const speakers=(r.participants||[]).filter(p=>p.speaker && !p.host);
    if(speakers.length){
      h+=`<div style="margin:4px 16px 10px;padding:12px 14px;background:var(--crema2);border-radius:16px;border:1px solid var(--linea)">
        <div style="font-size:12px;color:var(--miel);font-weight:800;margin-bottom:8px">🎙️ Tienen la palabra</div>`+
        speakers.map(sp=>`<div style="display:flex;align-items:center;gap:10px;padding:4px 0"><div class="avatar" style="width:32px;height:32px;font-size:13px">${escHtml((sp.name||'?').charAt(0).toUpperCase())}</div><span style="flex:1;font-size:13.5px;color:var(--cafe);font-weight:600">${escHtml(sp.name)}</span><button class="assist" style="background:#B24A3A" onclick="muteUser('${r.id}','${sp.id}')">Quitar / silenciar</button></div>`).join('')+
        `</div>`;
    }
  }
  let action='';
  if(r.myRole==='host'||r.myRole==='speaker'){
    const micOn = localStream && !micMuted;
    action=`<button id="mic-btn" class="primary-btn ${micOn?'':'ghost'}" style="margin:0;flex:1;${micOn?'background:#B24A3A':''}" onclick="requestMic('${r.id}')">${micOn?'🔴 Silenciar micrófono':'🎤 Activar micrófono'}</button>`;
  }else{
    action=`<button class="primary-btn ${r.iRaised?'':'ghost'}" style="margin:0;flex:1" onclick="raiseHand('${r.id}')">${r.iRaised?'✋ Bajar la mano':'✋ Pedir la palabra'}</button>`;
  }
  h+=`<div style="display:flex;gap:10px;padding:8px 22px 4px">${action}
      <button class="primary-btn" style="margin:0;flex:1;background:#8A5A2B" onclick="leaveRoom('${r.id}',${r.myRole==='host'})">${r.myRole==='host'?'Finalizar':'Salir'}</button></div>
    <button class="primary-btn ghost" style="margin:8px 22px 0;width:calc(100% - 44px)" onclick="minimizeRoom()">⌄ Minimizar y seguir escuchando</button>
    <div style="padding:8px 22px 6px;text-align:center;color:var(--suave);font-size:11.5px">${r.myRole==='host'?'Eres el anfitrión. Da la palabra a quien la pida. ':(r.myRole==='speaker'?'Tienes la palabra, ya te escuchan. ':'Pide la palabra y el anfitrión te la dará. ')}🎙️ Voz en vivo activa.</div>`;
  return h;
}

function partsHtml(parts){

    <div style="width:54px;height:54px;border-radius:50%;margin:0 auto 5px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;background:linear-gradient(145deg,${pt.host?'var(--oro),var(--miel)':'var(--miel),var(--caramelo)'});${pt.you?'box-shadow:0 0 0 3px var(--vainilla)':''}">${escHtml((pt.name||'?').charAt(0).toUpperCase())}</div>
    <div style="font-size:10.5px;color:var(--cafe);font-weight:600;line-height:1.2">${escHtml(pt.name)}${pt.host?'<br><span style="color:var(--miel)">🎙️ anfitrión</span>':(pt.speaker?'<br><span style="color:var(--miel)">🎙️ con voz</span>':(pt.you?'':'<br><span style="color:var(--suave);font-size:9.5px">ver perfil</span>'))}</div>
  </div>`).join('');

function chatRoomHtml(chat){
  if(!chat||!chat.length) return '<div class="empty" style="padding:14px">Aún nadie ha escrito. ¡Saluda a la sala! 🙏</div>';
  return chat.map(m=>{
    if(m.system) return `<div style="text-align:center;color:var(--suave);font-size:12px;margin:6px 0;font-style:italic">${escHtml(m.text)}</div>`;
    return `<div style="margin-bottom:9px"><b style="color:${m.host?'var(--miel)':'var(--caramelo)'};font-size:12.5px">${escHtml(m.name)}${m.host?' 🎙️':''}</b><div style="font-size:14px;color:var(--texto);line-height:1.4">${escHtml(m.text)}</div></div>`;
  }).join('');
}
async function updateRoom(){
  try{
    const r=await API('room?id='+encodeURIComponent(roomId));
    roomState=r; applyMicState();
    const c=document.getElementById('room-count'); if(c) c.textContent=r.listeners;
    const pp=document.getElementById('room-parts'); if(pp) pp.innerHTML=partsHtml(r.participants);
    const ctrl=document.getElementById('room-controls'); if(ctrl && document.activeElement.id!=='room-input') ctrl.innerHTML=roomControlsHtml(r);
    const box=document.getElementById('room-chat'); if(box){ const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<60; box.innerHTML=chatRoomHtml(r.chat); if(atBottom) box.scrollTop=box.scrollHeight; }
  }catch(e){
    clearInterval(roomPoll);
    if(roomId){ roomId=null; toast('El estudio terminó 🙏'); closeSheet(); if(tab==='oracion') renderOracion(); }
  }
}
async function roomSay(){
  const inp=document.getElementById('room-input'); const t=(inp.value||'').trim(); if(!t) return; inp.value='';
  try{ await API('room-say','POST',{id:roomId,text:t}); await updateRoom(); }catch(e){ toast(e.message); }
}
async function leaveRoom(id,isHost){
  inRoom=false; roomIsHost=false; clearInterval(roomPoll); roomId=null; roomState=null;
  stopVoice(); callEnd(); hideRoomBar();
  try{ await API('room-leave','POST',{id}); }catch(e){}
  toast(isHost?'Estudio finalizado 🙏':'Saliste de la sala');
  document.getElementById('sheet').classList.remove('open');
  if(tab==='oracion') renderOracion();
}
function setTheme(t){ prayerTheme=t; prayerIdx=0; renderOracion(); }
function regenPrayer(){ prayerIdx++; renderOracion(); toast('Nueva oración ✦'); }
function savePrayer(){
  const cur=prayers[prayerTheme][prayerIdx%prayers[prayerTheme].length];
  const exists=store.savedPrayers.some(x=>x.theme===prayerTheme&&x.text===cur);
  if(exists){ store.savedPrayers=store.savedPrayers.filter(x=>!(x.theme===prayerTheme&&x.text===cur)); toast('Quitada de guardadas'); }
  else{ store.savedPrayers.unshift({theme:prayerTheme,text:cur}); toast('Oración guardada ✦'); }
  persist(); renderOracion();
}

/* ===== VOZ EN VIVO (WebRTC) ===== */
let localStream=null, micMuted=false, roomState=null, rtcPoll=null, inRoom=false, roomIsHost=false;
const pcs={};
function myId(){ return auth.user? auth.user.id : ''; }
function amSpeaker(){ return roomState && (roomState.myRole==='host'||roomState.myRole==='speaker'); }
function applyMicState(){ if(localStream) localStream.getAudioTracks().forEach(t=> t.enabled = amSpeaker() && !micMuted ); }
function callStart(){ try{ if(window.AndroidApp&&AndroidApp.startCall) AndroidApp.startCall(); }catch(e){} }
function callEnd(){ try{ if(window.AndroidApp&&AndroidApp.endCall) AndroidApp.endCall(); }catch(e){} }
async function startVoice(id){
  stopVoice();
  try{ localStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true, noiseSuppression:true, autoGainControl:true}}); }
  catch(e){ localStream=null; toast('Entraste como oyente (sin micrófono) 🙏'); }
  micMuted=false; applyMicState();
  callStart();  // mantiene el audio vivo en segundo plano (APK)
  rtcPoll=setInterval(()=>rtcTick(id), 1000); rtcTick(id);
}
function stopVoice(){
  clearInterval(rtcPoll); rtcPoll=null;
  Object.keys(pcs).forEach(k=>{ try{pcs[k].close();}catch(e){} delete pcs[k]; });
  document.querySelectorAll('audio[data-rtc]').forEach(a=>{ try{a.srcObject=null;}catch(e){} a.remove(); });
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  micMuted=false;
}
/* Al volver de segundo plano (minimizar app / apagar pantalla), el móvil corta el audio: reconectamos todo. */
async function reconnectVoice(id){
  Object.keys(pcs).forEach(k=>{ try{pcs[k].close();}catch(e){} delete pcs[k]; });
  document.querySelectorAll('audio[data-rtc]').forEach(a=>{ try{a.srcObject=null;}catch(e){} a.remove(); });
  if(localStream && !localStream.getAudioTracks().some(t=>t.readyState==='live')) localStream=null;
  if(!localStream && amSpeaker()){
    try{ localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}); }catch(e){ localStream=null; }
  }
  micMuted=false; applyMicState();
  if(roomId===id && inRoom) rtcTick(id);
}
function onAppVisible(){
  if(!inRoom || !roomId) return;
  // Reanudar SIN reconstruir todo: así el micrófono no se corta al volver.
  document.querySelectorAll('audio[data-rtc]').forEach(a=>a.play().catch(()=>{}));
  applyMicState();
  rtcTick(roomId); // solo recrea conexiones que realmente se hayan caído
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') onAppVisible(); });
window.addEventListener('pageshow', onAppVisible);
window.addEventListener('focus', onAppVisible);
async function rtcTick(id){
  if(roomId!==id || !inRoom){ stopVoice(); return; } // salió de verdad → apaga micrófono
  applyMicState();
  let d; try{ d=await API('rtc?room='+encodeURIComponent(id)); }catch(e){ return; }
  if(d.ended){ inRoom=false; stopVoice(); callEnd(); hideRoomBar(); if(document.getElementById('sheet').classList.contains('open')&&document.getElementById('room-chat')){ closeSheet(); if(tab==='oracion') renderOracion(); } toast('El estudio terminó 🙏'); return; }
  const peers=d.peers||[];
  peers.forEach(pid=>{ if(!pcs[pid]) makePeer(id,pid, myId()<pid); });
  for(const pid in pcs){ if(!peers.includes(pid)){ try{pcs[pid].close();}catch(e){} delete pcs[pid]; const a=document.querySelector('audio[data-rtc="'+pid+'"]'); if(a){ try{a.srcObject=null;}catch(e){} a.remove(); } } }
  for(const s of (d.signals||[])) await handleSignal(id, s.from, s.data);
}
function makePeer(id, pid, initiator){
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  pcs[pid]=pc;
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));
  else { try{ pc.addTransceiver('audio',{direction:'recvonly'}); }catch(e){} }
  pc.onicecandidate=e=>{ if(e.candidate) sendSignal(id, pid, {candidate:e.candidate}); };
  pc.ontrack=e=>{ playRemote(pid, e.streams[0]); };
  pc.oniceconnectionstatechange=()=>{
    if(pc.iceConnectionState==='failed'||pc.iceConnectionState==='disconnected'||pc.iceConnectionState==='closed'){
      try{pc.close();}catch(err){}
      if(pcs[pid]===pc) delete pcs[pid];
      const a=document.querySelector('audio[data-rtc="'+pid+'"]'); if(a){ try{a.srcObject=null;}catch(err){} a.remove(); }
    }
  };
  if(initiator){ pc.createOffer().then(o=>pc.setLocalDescription(o)).then(()=>sendSignal(id,pid,{sdp:pc.localDescription})).catch(()=>{}); }
  return pc;
}
async function handleSignal(id, from, data){
  let pc=pcs[from]; if(!pc) pc=makePeer(id, from, false);
  try{
    if(data.sdp){
      await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      if(data.sdp.type==='offer'){ const ans=await pc.createAnswer(); await pc.setLocalDescription(ans); sendSignal(id, from, {sdp:pc.localDescription}); }
    }else if(data.candidate){ try{ await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); }catch(e){} }
  }catch(e){}
}
function sendSignal(id, to, data){ API('rtc','POST',{room:id,to,data}).catch(()=>{}); }
function playRemote(pid, stream){
  let a=document.querySelector('audio[data-rtc="'+pid+'"]');
  if(!a){ a=document.createElement('audio'); a.setAttribute('data-rtc',pid); a.autoplay=true; a.setAttribute('playsinline',''); document.body.appendChild(a); }
  a.srcObject=stream; a.play().catch(()=>{});
}
/* Botón: silenciar/activar el propio micrófono (solo si tienes la palabra) */
async function requestMic(id){
  if(!amSpeaker()){ toast('Pide la palabra; el anfitrión te dará el turno 🙏'); return; }
  if(!localStream){ toast('No diste permiso al micrófono. Sal y entra otra vez y acéptalo 🙏'); return; }
  micMuted=!micMuted; applyMicState(); updateRoom();
  toast(micMuted?'Micrófono silenciado 🔇':'Micrófono activo — habla 🎤');
}

  showRoomBar();
}
async function maximizeRoom(){
  if(!roomId||!inRoom) return;
  hideRoomBar();
  document.getElementById('sheet').classList.add('open');
  try{ const r=await API('room?id='+encodeURIComponent(roomId)); roomState=r; roomIsHost=!!r.isHost; buildRoomShell(r); }catch(e){}
  clearInterval(roomPoll); roomPoll=setInterval(()=>{ if(roomId && inRoom && document.getElementById('room-chat') && document.getElementById('sheet').classList.contains('open')) updateRoom(); }, 2500);
}
function showRoomBar(){
  let bar=document.getElementById('room-bar');
  if(!bar){ bar=document.createElement('div'); bar.id='room-bar'; bar.className='roombar'; document.getElementById('app').appendChild(bar); }
  bar.innerHTML=`<div style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer" onclick="maximizeRoom()"><span class="live"></span><b style="font-size:13px">Estudio en vivo</b><span style="color:var(--vainilla);font-size:12px">· escuchando</span></div>
    <button onclick="maximizeRoom()" style="background:rgba(255,255,255,.16);border:none;color:#FBEFDD;font-weight:700;font-size:12px;padding:7px 12px;border-radius:16px;cursor:pointer">Volver</button>
    <button onclick="leaveRoom(roomId,roomIsHost)" style="background:#B24A3A;border:none;color:#fff;font-weight:700;font-size:12px;padding:7px 12px;border-radius:16px;cursor:pointer">Salir</button>`;
  bar.style.display='flex';
}
function hideRoomBar(){ const bar=document.getElementById('room-bar'); if(bar) bar.style.display='none'; }
let toastT; function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>e.classList.remove('show'),2200); }
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============ INIT ============ */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
(async function boot(){
  applyTheme();
  if(location.protocol==='file:'){
    document.getElementById('nav').style.display='none';
    document.getElementById('fab').style.display='none';
    screen.innerHTML=`<div style="padding:60px 30px;text-align:center">
      <div style="font-size:48px">🕊️</div>
      <h2 style="font-family:Georgia,serif;color:var(--cafe);margin:14px 0 10px">Abre la app con el servidor</h2>
      <p style="color:var(--suave);font-size:14.5px;line-height:1.6">Para que la comunidad funcione (cuentas, publicaciones, mensajes) hay que abrirla con el servidor, no con doble clic al archivo.</p>
      <p style="color:var(--caramelo);font-size:14.5px;line-height:1.6;margin-top:14px"><b>Haz doble clic en<br>INICIAR_APOSENTO_ALTO.bat</b><br>y la app se abrirá sola. 🙏</p>
    </div>`;
    return;
  }
  if(auth.token){
    try{ const d=await API('me'); auth.user=d.user; enterApp(); return; }catch(e){ setToken(''); }
  }
  showAuth();
})();
</script>
